# Prometheus Configuration — Sentinel CubePath Ring-0
# Adaptado para el stack de hackathon con scraping de métricas eBPF y backend Rust

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sentinel-cubepath'
    environment: 'hackathon'

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Host node metrics (Ring-0 level)
  - job_name: 'node-exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          node: 'sentinel-cubepath-vps'
          role: 'ring0-guardian'

  # Sentinel Rust Backend API
  - job_name: 'sentinel-api'
    scrape_interval: 5s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'sentinel-cortex'
          layer: 'ring0'
