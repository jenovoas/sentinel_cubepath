apiVersion: 1

providers:
  - name: 'Sentinel CubePath Dashboards'
    orgId: 1
    folder: 'Sentinel Ring-0'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
