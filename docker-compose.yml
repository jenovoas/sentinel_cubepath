version: '3.8'

services:
  # ============================================================
  # CORE — Backend API (Rust Cortex) + Frontend Dashboard
  # ============================================================

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - CORS_ORIGIN=${CORS_ORIGIN:-https://vps23309.cubepath.net}
    restart: unless-stopped
    mem_limit: 512mb
    deploy:
      resources:
        limits:
          memory: 512mb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sentinel-network

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 512mb
    deploy:
      resources:
        limits:
          memory: 512mb
    networks:
      - sentinel-network

  # ============================================================
  # OBSERVABILITY STACK — Prometheus + Loki + Grafana
  # ============================================================

  node-exporter:
    image: prom/node-exporter:latest
    container_name: sentinel-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    pid: host
    restart: unless-stopped
    networks:
      - sentinel-network

  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    mem_limit: 128mb
    deploy:
      resources:
        limits:
          memory: 128mb
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.external-url=https://vps23309.cubepath.net/prometheus/"
      - "--web.route-prefix=/"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - sentinel-network

  loki:
    image: grafana/loki:latest
    container_name: sentinel-loki
    mem_limit: 128mb
    deploy:
      resources:
        limits:
          memory: 128mb
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - sentinel-network

  promtail:
    image: grafana/promtail:latest
    container_name: sentinel-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - sentinel-network

  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    mem_limit: 256mb
    deploy:
      resources:
        limits:
          memory: 256mb
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-sentinel2026}
      GF_SERVER_DOMAIN: vps23309.cubepath.net
      GF_SERVER_ROOT_URL: https://vps23309.cubepath.net/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      GF_SERVER_PROTOCOL: http
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - sentinel-network

  # ============================================================
  # AUTOMATION — n8n Defense Workflows (Reflex Arc)
  # ============================================================

  n8n:
    image: n8nio/n8n:latest
    container_name: sentinel-n8n
    mem_limit: 512mb
    deploy:
      resources:
        limits:
          memory: 512mb
    environment:
      GENERIC_TIMEZONE: America/Santiago
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-sentinel2026}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://vps23309.cubepath.net/n8n/
      N8N_PATH: /n8n/
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - sentinel-network

volumes:
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  n8n_data:
    driver: local

networks:
  sentinel-network:
    driver: bridge
    name: sentinel-network